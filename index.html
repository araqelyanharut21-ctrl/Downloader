<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Video Downloader</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .wrapper {
            max-width: 450px;
            margin: 40px auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h1 { color: #38bdf8; font-size: 26px; margin-bottom: 5px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }
        .input-field {
            width: 100%; padding: 15px; border-radius: 10px;
            border: 2px solid #334155; background: #0f172a;
            color: #ffffff; font-size: 16px; box-sizing: border-box;
            outline: none; transition: 0.3s;
        }
        .input-field:focus { border-color: #38bdf8; }
        .btn {
            color: #ffffff; border: none; padding: 15px;
            font-size: 16px; font-weight: bold; border-radius: 10px;
            width: 100%; margin-top: 15px; cursor: pointer;
            transition: 0.3s;
        }
        .btn-search {
            background: linear-gradient(135deg, #38bdf8, #0284c7);
            box-shadow: 0 4px 10px rgba(56, 189, 248, 0.3);
        }
        .btn-download {
            background: linear-gradient(135deg, #22c55e, #15803d);
            box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3);
            display: none;
        }
        .btn:hover { transform: translateY(-2px); }
        .loader {
            display: none; margin: 20px auto;
            border: 4px solid #334155; border-radius: 50%;
            border-top: 4px solid #38bdf8; width: 30px; height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>📥 Premium Downloader</h1>
    <p>Paste TikTok link to download HD video without watermark</p>

    <input type="text" id="videoUrl" class="input-field" placeholder="Paste your TikTok link here...">
    
    <button id="btnSearch" class="btn btn-search" onclick="processLink()">🔍 Fetch Video Details</button>
    <button id="btnDownload" class="btn btn-download" onclick="triggerDownloadAndAd()">📥 Download HD Now</button>
    
    <div id="loadingCircle" class="loader"></div>
</div>

<script>
    // ⚠️ ՏԵՂԱԴՐԻՐ ՔՈ ԻՍԿԱԿԱՆ ADSTERRA DIRECT LINK-Ը ԱՅՍՏԵՂ
    const adsterraLink = "https://www.effectivecpmnetwork.com/iwp3i40bja?key=1982c6aaafae8764b06cc9ef29b553ef";
    
    let finalDownloadUrl = "";

    async function processLink() {
        const urlInput = document.getElementById("videoUrl").value;
        
        if (!urlInput.trim()) {
            alert("Please paste a valid TikTok link.");
            return;
        }

        document.getElementById("loadingCircle").style.display = "block";
        document.getElementById("btnSearch").style.display = "none";

        try {
            // Կանչում ենք API-ն վիդեոն ստանալու համար
            const response = await fetch(`https://api.tikwm.com/api/?url=${encodeURIComponent(urlInput)}`);
            const data = await response.json();

            document.getElementById("loadingCircle").style.display = "none";

            if (data && data.data && data.data.play) {
                finalDownloadUrl = data.data.play;
                // Թաքցնում ենք որոնման կոճակը, ցույց տալիս բեռնման կոճակը
                document.getElementById("btnDownload").style.display = "block";
            } else {
                alert("Error: Video not found or link is invalid.");
                document.getElementById("btnSearch").style.display = "block";
            }
        } catch (error) {
            document.getElementById("loadingCircle").style.display = "none";
            document.getElementById("btnSearch").style.display = "block";
            alert("Failed to process video. Please try again.");
        }
    }

    function triggerDownloadAndAd() {
        if (!finalDownloadUrl) return;

        // 1. Միանգամից բացում է գովազդը նոր պատուհանում (Սա քեզ փող է բերում)
        window.open(adsterraLink, '_blank');

        // 2. Նույն վայրկյանին հիմնական էջում սկսում է իրական ֆայլի ներբեռնումը
        window.location.href = finalDownloadUrl;
    }
</script>

</body>
</html>
